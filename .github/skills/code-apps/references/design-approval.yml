name: Code Apps 設計承認
description: "Code Apps 設計フェーズの承認記録（承認ゲート）。承認された設計が実装・改善デプロイの基準になる。"
title: "[設計承認] <アプリ名>"
labels: ["design-approval"]
body:
  - type: markdown
    attributes:
      value: |
        `code-apps` スキルの設計フェーズで提示した設計を記録し、承認の証跡を残すテンプレートです。
        このファイルは `.github/skills/code-apps/references/design-approval.yml` にあるテンプレートで、
        設計承認を Issue として記録する対象プロジェクトの `.github/ISSUE_TEMPLATE/` にコピーして使用します。
        記入項目はデザインシステム（`.github/skills/code-apps/references/design-system.md`）の
        「設計提示時に含める内容」と、デザインテンプレート集
        （`.github/skills/code-apps/references/design-templates.md`）の選定内容に対応します。
        **再承認**が必要になった場合（画面・パターン・スキーマの変更）は、この Issue に差分をコメントで提示し、
        承認コメントをもって再承認とします。
  - type: input
    id: app-name
    attributes:
      label: アプリ名 / ソリューション
      placeholder: "例: 営業支援ポータル（SOLUTION_NAME=SalesPortal / PUBLISHER_PREFIX=myco）"
    validations:
      required: true
  - type: input
    id: design-template
    attributes:
      label: デザインテンプレート / カラーパレット
      placeholder: "例: 1. Sidebar / 1. Ocean Blue"
    validations:
      required: true
  - type: textarea
    id: screens
    attributes:
      label: 画面一覧
      description: ページ名・ルート・役割・主なコンポーネント（ListTable / StatsCards / KanbanBoard 等）
      value: |
        | 画面 | ルート | 役割 | 主なコンポーネント |
        |---|---|---|---|
        |  |  |  |  |
    validations:
      required: true
  - type: textarea
    id: patterns
    attributes:
      label: 適用デザインパターン
      description: デザインシステム（design-system.md）・コンポーネント選定ガイドから、対象・理由付きで列挙
      value: |
        | 対象 | パターン | 理由 |
        |---|---|---|
        | 全体 | レイヤードアーキテクチャ（pages → hooks → services → SDK） | 標準構成 |
        |  |  |  |
    validations:
      required: true
  - type: textarea
    id: data-model
    attributes:
      label: テーブル・Lookup 名前解決
      description: 対象 Dataverse テーブルと、解決する Lookup（`_xxx_value` + `useMemo` Map）
      value: |
        | テーブル | 主な列 | 解決する Lookup |
        |---|---|---|
        |  |  |  |
  - type: textarea
    id: notes
    attributes:
      label: 補足（ナビゲーション・テーマ・フロー連携・制約）
  - type: checkboxes
    id: approval
    attributes:
      label: 承認ゲート
      options:
        - label: 上記の設計で実装を開始することを承認する（承認前に `src/` の実装を開始しない）
          required: false
