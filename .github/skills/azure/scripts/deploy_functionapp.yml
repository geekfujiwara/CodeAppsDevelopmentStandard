# CI からの Function App デプロイ雛形 (汎用)。
# 企業ネットワークからの大容量 zip デプロイは接続リセットされることがあるため、CI から実行する。
# Function App の publish エンドポイントは公開のため runner から到達可能（private storage には触れない）。
#
# 使い方: <FUNCTION_APP> と secrets を自リポジトリに合わせて置換する。実値・固有名はコミットしない。
name: Deploy API (Function App)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build API
        working-directory: api
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm prune --omit=dev

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}   # リポジトリ変数で指定（実名をハードコードしない）
          package: api
